<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>AIRP 多场景 AI 实训平台 - 登录</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body class="airp-body">
    <div class="auth-wrapper">
      <div class="auth-card">
        <h1 class="auth-title">AIRP 实训平台</h1>
        <p class="auth-subtitle">多场景 AI 角色扮演训练 Demo</p>

        <form id="login-form" class="auth-form">
          <div class="form-group">
            <label for="username">用户名</label>
            <input id="username" name="username" type="text" required />
          </div>
          <div class="form-group">
            <label for="password">密码</label>
            <input id="password" name="password" type="password" required />
          </div>
          <button type="submit" class="btn primary-btn full">登录</button>
        </form>

        <p class="auth-link-row">
          还没有账号？
          <a href="register.html">去注册</a>
        </p>
        <p class="demo-tip">当前为 Demo 版本，AI 大模型模块正在开发中。</p>
      </div>
    </div>

    <script src="../js/api.js"></script>
    <script>
      const form = document.getElementById('login-form');
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = form.username.value.trim();
        const password = form.password.value;
        if (!username || !password) return;

        try {
          const res = await apiPost('/api/login', { username, password });
          localStorage.setItem('airp_token', res.token);
          localStorage.setItem('airp_username', res.username);
          window.location.href = 'app.html';
        } catch (err) {
          alert(err.message || '登录失败');
        }
      });
    </script>
  </body>
</html>
